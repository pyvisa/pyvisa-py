name: Continuous Integration
on:
  schedule:
    - cron: "0 0 * * 2"
  push:
    branches:
      - main
      - staging
      - trying
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - "pyvisa_py/**"
      - pyproject.toml
      - setup.py

jobs:
  formatting:
    name: Check code formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install git+https://github.com/pyvisa/pyvisa.git@main
      - name: Formatting
        run: |
          ruff format pyvisa_py --check;
      - name: Linting
        if: always()
        run: |
          ruff check pyvisa_py;
      - name: Mypy
        if: always()
        run: |
          mypy pyvisa_py;
  tests:
    name: Unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13-dev"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/pyvisa/pyvisa.git#egg=pyvisa
      - name: Install project
        run: |
          pip install -e .
      - name: Test with pytest
        run: |
          pip install pytest-cov
          pytest pyvisa_py/testsuite --cov pyvisa_py --cov-report xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

  lxi-srq-scaffold-linux:
    name: LXI SRQ scaffold tests (Linux)
    runs-on: ubuntu-latest
    needs:
      - formatting
    if: needs.formatting.result == 'success' && vars.PYVISA_PY_RUN_LXI_SRQ == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/pyvisa/pyvisa.git#egg=pyvisa
          pip install -e .
          pip install pytest

      - name: Download pyvisa-tester binary
        run: |
          curl -L https://github.com/pyvisa/pyvisa-tester/releases/latest/download/pyvisa-lxi-fake-linux-x86_64.tar.gz -o pyvisa-lxi-fake-linux-x86_64.tar.gz
          mkdir -p .tester
          tar -C .tester -xzf pyvisa-lxi-fake-linux-x86_64.tar.gz
          chmod +x .tester/pyvisa-lxi-fake

      - name: Start fake instruments
        run: |
          mkdir -p .lxi-artifacts
          ./.tester/pyvisa-lxi-fake --env-file .lxi-artifacts/lxi.env --artifacts-dir .lxi-artifacts > .lxi-artifacts/runner.log 2>&1 &
          echo $! > .lxi-artifacts/pid

          for _ in $(seq 1 60); do
            if [ -s .lxi-artifacts/lxi.env ]; then
              break
            fi
            sleep 1
          done

          test -s .lxi-artifacts/lxi.env

      - name: Run SRQ scaffold tests
        run: |
          set -a
          . ./.lxi-artifacts/lxi.env
          set +a
          python -m pytest pyvisa_py/testsuite/lxi_assisted_tests/test_srq_events.py -q

      - name: Stop fake instruments
        if: always()
        run: |
          if [ -f .lxi-artifacts/pid ]; then
            kill "$(cat .lxi-artifacts/pid)" || true
          fi

      - name: Upload LXI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lxi-srq-scaffold-linux-artifacts
          path: .lxi-artifacts

  # Added to summarize the matrix (otherwise we would need to list every single
  # job in bors.toml)
  tests-result:
    name: Tests result
    if: always()
    needs:
      - tests
    runs-on: ubuntu-latest
    steps:
      - name: Mark the job as a success
        if: needs.tests.result == 'success'
        run: exit 0
      - name: Mark the job as a failure
        if: needs.tests.result != 'success'
        run: exit 1
